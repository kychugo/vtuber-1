<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miku VTuber Controller</title>

  <!-- Load Cubism 4 Core first (required by pixi-live2d-display) -->
  <!-- Primary CDN: Live2D official SDK. -->
  <!-- Fallback (onerror): community mirror on jsDelivr — use as last resort only, -->
  <!-- as it is an unofficial copy. Replace with an official mirror if one becomes available. -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"
          onerror="(function(){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2dcubismcore.min.js';document.head.appendChild(s);})()"></script>
  <!-- PIXI.js v6 -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6/dist/browser/pixi.min.js"></script>
  <!-- pixi-live2d-display: cubism4-only build (no Cubism 2 runtime needed) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Canvas area ─────────────────────────────────── */
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas-wrap canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }
    #status {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.6);
      color: #58a6ff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      pointer-events: none;
      transition: opacity .4s;
    }

    /* ── Side panel ──────────────────────────────────── */
    #panel {
      width: 290px;
      min-width: 290px;
      background: #161b22;
      border-left: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #panel-header {
      padding: 14px 16px 10px;
      background: #21262d;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #panel-header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #f0f6fc;
      flex: 1;
    }

    /* ── Mode toggle ─────────────────────────────────── */
    #mode-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #21262d;
      border: 1px solid #58a6ff;
      color: #58a6ff;
      cursor: pointer;
      white-space: nowrap;
    }
    #mode-btn:hover { background: #1f6feb; color: #fff; border-color: #388bfd; }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
      scrollbar-width: thin;
      scrollbar-color: #30363d #161b22;
    }

    /* ── Sections ────────────────────────────────────── */
    .section {
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #8b949e;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #21262d;
    }

    /* ── Buttons ─────────────────────────────────────── */
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 6px;
    }
    button {
      background: #21262d;
      color: #c9d1d9;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 5px 10px;
      cursor: pointer;
      font-size: 12px;
      transition: background .15s, border-color .15s;
    }
    button:hover { background: #30363d; border-color: #58a6ff; color: #58a6ff; }
    button.active { background: #1f6feb; border-color: #388bfd; color: #fff; }

    /* Easy-mode expression buttons — larger, emoji-centred */
    .expr-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }
    .expr-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 8px 4px;
      font-size: 11px;
      line-height: 1.2;
    }
    .expr-btn .emoji { font-size: 22px; }

    /* Easy-mode motion buttons — wider */
    .motion-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 5px;
      margin-bottom: 6px;
    }
    .motion-big {
      padding: 8px 6px;
      font-size: 12px;
    }

    /* ── Sliders ─────────────────────────────────────── */
    .param-row {
      display: grid;
      grid-template-columns: 110px 1fr 38px;
      align-items: center;
      gap: 6px;
      margin-bottom: 7px;
    }
    .param-row label {
      font-size: 11px;
      color: #c9d1d9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    input[type=range] {
      width: 100%;
      accent-color: #58a6ff;
      cursor: pointer;
    }
    .param-val {
      font-size: 11px;
      color: #8b949e;
      text-align: right;
      min-width: 30px;
    }

    /* ── Toggle / color ──────────────────────────────── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .toggle-row label { color: #c9d1d9; font-size: 12px; }
    input[type=checkbox] { accent-color: #58a6ff; width: 16px; height: 16px; cursor: pointer; }
    input[type=color] { border: none; background: none; width: 30px; height: 24px; cursor: pointer; padding: 0; }

    /* ── Mode visibility ─────────────────────────────── */
    .pro-only { display: none; }
    body.pro-mode .pro-only { display: block; }
    body.pro-mode .easy-only { display: none; }
  </style>
</head>
<body>

<!-- ── Canvas ─────────────────────────────────────────── -->
<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
  <div id="status">Loading model…</div>
</div>

<!-- ── Controller Panel ───────────────────────────────── -->
<div id="panel">
  <div id="panel-header">
    <span>🎮</span>
    <h1>VTuber Controller</h1>
    <button id="mode-btn" onclick="toggleMode()" title="Switch between Easy and Pro mode">⚙ Pro Mode</button>
  </div>

  <div id="panel-body">

    <!-- ══ EASY MODE ══════════════════════════════════ -->

    <!-- Easy: Expressions -->
    <div class="section easy-only">
      <div class="section-title">😊 Expressions</div>
      <div class="expr-grid">
        <button class="expr-btn" onclick="applyExpression('normal')"  title="Normal"><span class="emoji">😐</span>Normal</button>
        <button class="expr-btn" onclick="applyExpression('happy')"   title="Happy"><span class="emoji">😊</span>Happy</button>
        <button class="expr-btn" onclick="applyExpression('sad')"     title="Sad"><span class="emoji">😢</span>Sad</button>
        <button class="expr-btn" onclick="applyExpression('angry')"   title="Angry"><span class="emoji">😠</span>Angry</button>
        <button class="expr-btn" onclick="applyExpression('surprised')" title="Surprised"><span class="emoji">😲</span>Surprised</button>
        <button class="expr-btn" onclick="applyExpression('wink')"    title="Wink"><span class="emoji">😉</span>Wink</button>
      </div>
    </div>

    <!-- Easy: Motions -->
    <div class="section easy-only">
      <div class="section-title">🎬 Motions</div>
      <div class="motion-grid">
        <button class="motion-big" onclick="playMotion('Idle',0)">💤 Idle 1</button>
        <button class="motion-big" onclick="playMotion('Idle',1)">💤 Idle 2</button>
        <button class="motion-big" onclick="playMotion('Idle',2)">💤 Idle 3</button>
        <button class="motion-big" onclick="playMotion('Tap',0)">👆 Tap 1</button>
        <button class="motion-big" onclick="playMotion('Tap',1)">👆 Tap 2</button>
        <button class="motion-big" onclick="playMotion('Flick',0)">💨 Flick 1</button>
        <button class="motion-big" onclick="playMotion('Flick',1)">💨 Flick 2</button>
        <button class="motion-big" onclick="playMotion('FlickUp',0)">⬆ Flick Up</button>
        <button class="motion-big" onclick="playMotion('Wave',0)">👋 Built-in Wave</button>
      </div>
      <div class="btn-row">
        <button style="width:100%" onclick="stopAll()">⏹ Stop All</button>
      </div>
    </div>

    <!-- Easy: Performances (large procedural motions) -->
    <div class="section easy-only">
      <div class="section-title">🎭 Performances</div>
      <div class="motion-grid">
        <button class="motion-big" onclick="performJump()">🦘 Jump!</button>
        <button class="motion-big" onclick="performWaveBig()">👋 Wave Hello</button>
        <button class="motion-big" id="btn-dance" onclick="toggleDance()">💃 Dance</button>
        <button class="motion-big" id="btn-talk" onclick="toggleTalk()">💬 Talking</button>
        <button class="motion-big" id="btn-excited" onclick="toggleExcited()">🌟 Excited!</button>
        <button class="motion-big" onclick="stopPerformance()">⏹ Stop Perf</button>
      </div>
    </div>

    <!-- Easy: AI Control -->
    <div class="section easy-only">
      <div class="section-title">🤖 AI Control</div>
      <div class="toggle-row">
        <label>Auto-Cycle Motions</label>
        <input type="checkbox" id="chk-ai-auto" onchange="toggleAiAuto(this.checked)" />
      </div>
      <div style="display:flex;gap:5px;margin-bottom:6px">
        <input type="text" id="ai-text"
               placeholder="Type: jump, dance, wave, talk…"
               style="flex:1;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:5px 8px;font-size:12px"
               onkeydown="if(event.key==='Enter')sendAiText()" />
        <button onclick="sendAiText()" style="white-space:nowrap">▶ Go</button>
      </div>
      <div id="ai-reply" style="font-size:11px;color:#58a6ff;min-height:16px;word-wrap:break-word"></div>
    </div>

    <!-- Easy: Basic Settings -->
    <div class="section easy-only">
      <div class="section-title">⚙ Settings</div>
      <div class="toggle-row">
        <label>Mouse Tracking</label>
        <input type="checkbox" id="chk-track-easy" checked onchange="toggleTracking(this.checked)" />
      </div>
      <div class="toggle-row">
        <label>Background</label>
        <input type="color" id="bg-color-easy" value="#0d1117" oninput="setBg(this.value)" />
      </div>
      <div class="param-row" style="grid-template-columns:110px 1fr 38px">
        <label>Scale</label>
        <input type="range" id="sl-scale-easy" min="0.2" max="3.0" step="0.01" value="1.3" oninput="setScale(this.value)" />
        <span class="param-val" id="val-scale-easy">1.30</span>
      </div>
    </div>

    <!-- ══ PRO MODE ════════════════════════════════════ -->

    <!-- Pro: Settings -->
    <div class="section pro-only">
      <div class="section-title">Settings</div>

      <div class="toggle-row">
        <label>Mouse Tracking</label>
        <input type="checkbox" id="chk-track" checked onchange="toggleTracking(this.checked)" />
      </div>

      <div class="toggle-row">
        <label>Manual Params</label>
        <input type="checkbox" id="chk-manual" onchange="toggleManual(this.checked)" />
      </div>

      <div class="toggle-row">
        <label>Background</label>
        <input type="color" id="bg-color" value="#0d1117" oninput="setBg(this.value)" />
      </div>

      <div class="param-row" style="grid-template-columns:110px 1fr 38px">
        <label>Scale</label>
        <input type="range" id="sl-scale" min="0.2" max="3.0" step="0.01" value="1.3" oninput="setScale(this.value)" />
        <span class="param-val" id="val-scale-pro">1.30</span>
      </div>
    </div>

    <!-- Pro: Motions -->
    <div class="section pro-only">
      <div class="section-title">Motions</div>
      <div class="btn-row">
        <button onclick="playMotion('Idle',0)">Idle 1</button>
        <button onclick="playMotion('Idle',1)">Idle 2</button>
        <button onclick="playMotion('Idle',2)">Idle 3</button>
      </div>
      <div class="btn-row">
        <button onclick="playMotion('Tap',0)">Tap 1</button>
        <button onclick="playMotion('Tap',1)">Tap 2</button>
      </div>
      <div class="btn-row">
        <button onclick="playMotion('Flick',0)">Flick 1</button>
        <button onclick="playMotion('Flick',1)">Flick 2</button>
        <button onclick="playMotion('FlickUp',0)">Flick Up</button>
        <button onclick="playMotion('Wave',0)">Wave</button>
      </div>
      <div class="btn-row">
        <button onclick="stopAll()">⏹ Stop All</button>
      </div>
    </div>

    <!-- Pro: Performances -->
    <div class="section pro-only">
      <div class="section-title">Performances</div>
      <div class="btn-row">
        <button onclick="performJump()">🦘 Jump</button>
        <button onclick="performWaveBig()">👋 Wave Hello</button>
        <button id="btn-dance-pro" onclick="toggleDance()">💃 Dance</button>
        <button id="btn-talk-pro" onclick="toggleTalk()">💬 Talk</button>
        <button id="btn-excited-pro" onclick="toggleExcited()">🌟 Excited</button>
        <button onclick="stopPerformance()">⏹ Stop Perf</button>
      </div>
    </div>

    <!-- Pro: AI Control -->
    <div class="section pro-only">
      <div class="section-title">AI Control</div>
      <div class="toggle-row">
        <label>Auto-Cycle Motions</label>
        <input type="checkbox" id="chk-ai-auto-pro" onchange="toggleAiAuto(this.checked)" />
      </div>
      <div style="display:flex;gap:5px;margin-bottom:6px">
        <input type="text" id="ai-text-pro"
               placeholder="Type action…"
               style="flex:1;background:#0d1117;color:#c9d1d9;border:1px solid #30363d;border-radius:6px;padding:5px 8px;font-size:12px"
               onkeydown="if(event.key==='Enter')sendAiText('pro')" />
        <button onclick="sendAiText('pro')">▶</button>
      </div>
    </div>

    <!-- Pro: Head -->
    <div class="section pro-only">
      <div class="section-title">Head</div>
      <div id="params-head"></div>
    </div>

    <!-- Pro: Eyes -->
    <div class="section pro-only">
      <div class="section-title">Eyes</div>
      <div id="params-eyes"></div>
    </div>

    <!-- Pro: Eyebrows -->
    <div class="section pro-only">
      <div class="section-title">Eyebrows</div>
      <div id="params-brow"></div>
    </div>

    <!-- Pro: Mouth -->
    <div class="section pro-only">
      <div class="section-title">Mouth</div>
      <div id="params-mouth"></div>
    </div>

    <!-- Pro: Body -->
    <div class="section pro-only">
      <div class="section-title">Body</div>
      <div id="params-body"></div>
    </div>

    <!-- Pro: Hair / Sway -->
    <div class="section pro-only">
      <div class="section-title">Hair &amp; Sway</div>
      <div id="params-hair"></div>
    </div>

  </div><!-- /panel-body -->
</div><!-- /panel -->

<script>
// ── Parameter definitions ────────────────────────────────────────────────────
const PARAM_GROUPS = [
  { id: 'params-head', params: [
    { id:'ParamAngleX',    label:'Angle X',   min:-30, max:30,  step:0.1,  def:0 },
    { id:'ParamAngleY',    label:'Angle Y',   min:-30, max:30,  step:0.1,  def:0 },
    { id:'ParamAngleZ',    label:'Angle Z',   min:-30, max:30,  step:0.1,  def:0 },
    { id:'ParamCheek',     label:'Cheek',     min:0,   max:1,   step:0.01, def:0 },
  ]},
  { id: 'params-eyes', params: [
    { id:'ParamEyeLOpen',  label:'L Eye Open',  min:0, max:1, step:0.01, def:1 },
    { id:'ParamEyeROpen',  label:'R Eye Open',  min:0, max:1, step:0.01, def:1 },
    { id:'ParamEyeLSmile', label:'L Eye Smile', min:0, max:1, step:0.01, def:0 },
    { id:'ParamEyeRSmile', label:'R Eye Smile', min:0, max:1, step:0.01, def:0 },
    { id:'ParamEyeBallX',  label:'Eyeball X',   min:-1, max:1, step:0.01, def:0 },
    { id:'ParamEyeBallY',  label:'Eyeball Y',   min:-1, max:1, step:0.01, def:0 },
  ]},
  { id: 'params-brow', params: [
    { id:'ParamBrowLY',     label:'L Brow Y',     min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowRY',     label:'R Brow Y',     min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowLX',     label:'L Brow X',     min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowRX',     label:'R Brow X',     min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowLAngle', label:'L Brow Angle', min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowRAngle', label:'R Brow Angle', min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowLForm',  label:'L Brow Form',  min:-1, max:1, step:0.01, def:0 },
    { id:'ParamBrowRForm',  label:'R Brow Form',  min:-1, max:1, step:0.01, def:0 },
  ]},
  { id: 'params-mouth', params: [
    { id:'ParamMouthOpenY', label:'Mouth Open', min:0, max:1, step:0.01, def:0 },
    { id:'ParamMouthForm',  label:'Mouth Form', min:-1, max:1, step:0.01, def:0 },
  ]},
  { id: 'params-body', params: [
    { id:'ParamBodyAngleX', label:'Body Angle X', min:-10, max:10, step:0.1, def:0 },
    { id:'ParamBodyAngleY', label:'Body Angle Y', min:-10, max:10, step:0.1, def:0 },
    { id:'ParamBodyAngleZ', label:'Body Angle Z', min:-10, max:10, step:0.1, def:0 },
    { id:'ParamBreath',     label:'Breath',       min:0, max:1, step:0.01, def:0 },
    { id:'ParamArmL',       label:'Arm L',        min:-1, max:1, step:0.01, def:0 },
    { id:'ParamArmR',       label:'Arm R',        min:-1, max:1, step:0.01, def:0 },
  ]},
  { id: 'params-hair', params: [
    { id:'ParamHairFront',  label:'Hair Front',   min:-1, max:1, step:0.01, def:0 },
    { id:'ParamHairFront2', label:'Hair Front 2', min:-1, max:1, step:0.01, def:0 },
    { id:'ParamHairBack',   label:'Hair Back',    min:-1, max:1, step:0.01, def:0 },
  ]},
];

// ── Expression presets ───────────────────────────────────────────────────────
// Each preset is a map of paramId -> value; omitted params keep their current value.
const EXPRESSIONS = {
  normal: {
    ParamEyeLOpen: 1, ParamEyeROpen: 1,
    ParamEyeLSmile: 0, ParamEyeRSmile: 0,
    ParamBrowLY: 0, ParamBrowRY: 0,
    ParamBrowLAngle: 0, ParamBrowRAngle: 0,
    ParamMouthOpenY: 0, ParamMouthForm: 0,
    ParamCheek: 0,
  },
  happy: {
    ParamEyeLOpen: 0.6, ParamEyeROpen: 0.6,
    ParamEyeLSmile: 1, ParamEyeRSmile: 1,
    ParamBrowLY: 0.5, ParamBrowRY: 0.5,
    ParamMouthOpenY: 0.3, ParamMouthForm: 1,
    ParamCheek: 0.8,
  },
  sad: {
    ParamEyeLOpen: 0.7, ParamEyeROpen: 0.7,
    ParamEyeLSmile: 0, ParamEyeRSmile: 0,
    ParamBrowLY: -0.5, ParamBrowRY: -0.5,
    ParamBrowLAngle: -0.6, ParamBrowRAngle: 0.6,
    ParamMouthOpenY: 0, ParamMouthForm: -0.8,
    ParamCheek: 0,
  },
  angry: {
    ParamEyeLOpen: 0.8, ParamEyeROpen: 0.8,
    ParamEyeLSmile: 0, ParamEyeRSmile: 0,
    ParamBrowLY: -0.3, ParamBrowRY: -0.3,
    ParamBrowLAngle: 0.7, ParamBrowRAngle: -0.7,
    ParamMouthOpenY: 0.1, ParamMouthForm: -0.5,
    ParamCheek: 0,
  },
  surprised: {
    ParamEyeLOpen: 1, ParamEyeROpen: 1,
    ParamEyeLSmile: 0, ParamEyeRSmile: 0,
    ParamBrowLY: 1, ParamBrowRY: 1,
    ParamBrowLAngle: 0, ParamBrowRAngle: 0,
    ParamMouthOpenY: 0.8, ParamMouthForm: 0,
    ParamCheek: 0,
  },
  wink: {
    ParamEyeLOpen: 1, ParamEyeROpen: 0,
    ParamEyeLSmile: 0.5, ParamEyeRSmile: 1,
    ParamBrowLY: 0.3, ParamBrowRY: 0,
    ParamMouthOpenY: 0, ParamMouthForm: 0.6,
    ParamCheek: 0.4,
  },
};

// ── Config ──────────────────────────────────────────────────────────────────
const MODEL_PATH = 'miku_sample_t04.model3.json';

// ── State ───────────────────────────────────────────────────────────────────
let app, model;
let manualMode = false;
let proMode = false;
let currentScale = 1.3;
const overrides = {}; // paramId -> value (used in manual mode)

// ── Build slider UI ─────────────────────────────────────────────────────────
function buildSliders() {
  for (const group of PARAM_GROUPS) {
    const container = document.getElementById(group.id);
    for (const p of group.params) {
      const row = document.createElement('div');
      row.className = 'param-row';

      const lbl = document.createElement('label');
      lbl.title = p.id;
      lbl.textContent = p.label;

      const sl = document.createElement('input');
      sl.type = 'range';
      sl.min = p.min;
      sl.max = p.max;
      sl.step = p.step;
      sl.value = p.def;
      sl.id = 'sl_' + p.id;

      const val = document.createElement('span');
      val.className = 'param-val';
      val.id = 'val_' + p.id;
      val.textContent = p.def.toFixed(2);

      sl.addEventListener('input', () => {
        const v = parseFloat(sl.value);
        val.textContent = v.toFixed(2);
        overrides[p.id] = v;
        if (manualMode && model) {
          model.internalModel.coreModel.setParameterValueById(p.id, v);
        }
      });

      row.appendChild(lbl);
      row.appendChild(sl);
      row.appendChild(val);
      container.appendChild(row);
    }
  }
}

// ── Update slider displays from live model ──────────────────────────────────
function syncSliders() {
  if (!model || manualMode) return;
  for (const group of PARAM_GROUPS) {
    for (const p of group.params) {
      const sl = document.getElementById('sl_' + p.id);
      const vl = document.getElementById('val_' + p.id);
      if (!sl) continue;
      try {
        const core = model.internalModel.coreModel;
        const idx = core.getParameterIndex(p.id);
        if (idx >= 0) {
          const v = core.getParameterValueByIndex(idx);
          sl.value = v;
          vl.textContent = v.toFixed(2);
        }
      } catch (err) {
        console.debug('Failed to sync parameter:', p.id, err);
      }
    }
  }
}

// ── Main init ───────────────────────────────────────────────────────────────
async function init() {
  // Verify CDN libraries loaded before trying to use them
  if (typeof PIXI === 'undefined') {
    setStatus('❌ PIXI.js failed to load — check your internet connection.');
    return;
  }
  if (!PIXI.live2d) {
    setStatus('❌ pixi-live2d-display failed to load — check your internet connection.');
    return;
  }

  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('canvas');

  app = new PIXI.Application({
    view: canvas,
    width: wrap.clientWidth,
    height: wrap.clientHeight,
    backgroundColor: 0x0d1117,
    antialias: true,
    resolution: window.devicePixelRatio || 1,
    autoDensity: true,
  });

  // Resize handler
  window.addEventListener('resize', () => {
    app.renderer.resize(wrap.clientWidth, wrap.clientHeight);
    if (model) positionModel();
  });

  try {
    model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
      autoInteract: true,
    });

    app.stage.addChild(model);
    positionModel();

    // Start idle motion
    model.motion('Idle');

    // Sync sliders every frame
    app.ticker.add(syncSliders);

    // Enhanced auto-animation: blink and mouth overlay
    // We monkey-patch the internalModel's update so we can
    // inject bigger blinks and mouth movement after motion eval.
    installEnhancedAnimation();

    setStatus('✅ Miku loaded! Enjoy~', 2000);
  } catch (err) {
    setStatus('❌ Failed to load model: ' + err.message);
    console.error(err);
  }
}

// ── Helpers ─────────────────────────────────────────────────────────────────
function positionModel() {
  if (!model) return;
  const sw = app.screen.width;
  const sh = app.screen.height;
  const scale = Math.min(sw / model.internalModel.originalWidth,
                         sh / model.internalModel.originalHeight) * 1.3 * currentScale;
  model.scale.set(scale);
  model.x = sw / 2;
  model.y = sh / 2;
  model.anchor.set(0.5, 0.5);
}

function setStatus(msg, hideAfter) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.opacity = '1';
  if (hideAfter) {
    setTimeout(() => { el.style.opacity = '0'; }, hideAfter);
  }
}

// ── Control API (called from HTML) ──────────────────────────────────────────
function playMotion(group, index) {
  if (!model) return;
  stopPerformance();
  model.motion(group, index);
  setStatus(`▶ ${group} ${index + 1}`, 1500);
}

function stopMotion() {
  if (!model) return;
  model.internalModel.motionManager.stopAllMotions();
}

function stopAll() {
  stopPerformance();
  stopMotion();
  setStatus('⏹ Stopped', 1200);
}

// ── Procedural Performance Engine ───────────────────────────────────────────
// Each performance is a config object:
//   { name, duration (s), loop (bool), update(t) → { paramId: value, … } }
//
// Performances run via the PIXI app ticker so they execute AFTER the Live2D
// motion system has updated parameters each frame, allowing them to fully
// override whatever the built-in motions would have set.

let _perfTickerFn = null;   // currently running ticker callback
let _perfStart    = 0;
let _perfConfig   = null;
let _perfActive   = '';     // '' | 'dance' | 'talk' | 'excited'  (for toggle buttons)

function startPerformance(cfg) {
  if (!model) return;
  _stopPerfTicker();
  stopMotion();
  manualMode = true;
  _perfConfig = cfg;
  _perfStart  = performance.now();
  _perfActive = cfg.key || '';
  _syncPerfButtons();

  _perfTickerFn = () => {
    const elapsed = (performance.now() - _perfStart) / 1000;
    const t = cfg.loop
      ? elapsed % cfg.duration
      : Math.min(elapsed, cfg.duration);

    const params = cfg.update(t);
    const core = model.internalModel.coreModel;
    for (const [id, val] of Object.entries(params)) {
      try { core.setParameterValueById(id, val); } catch (_) {}
    }

    if (!cfg.loop && elapsed > cfg.duration + 0.05) {
      stopPerformance();
    }
  };

  app.ticker.add(_perfTickerFn);
  setStatus(cfg.name, cfg.loop ? 0 : (cfg.duration * 1000 + 600));
}

function _stopPerfTicker() {
  if (_perfTickerFn && app) {
    app.ticker.remove(_perfTickerFn);
    _perfTickerFn = null;
  }
}

function stopPerformance() {
  _stopPerfTicker();
  _perfActive = '';
  _syncPerfButtons();
  manualMode = false;
  if (model) model.motion('Idle');
}

function _syncPerfButtons() {
  const pairs = [
    ['btn-dance',       'btn-dance-pro',   'dance'],
    ['btn-talk',        'btn-talk-pro',    'talk'],
    ['btn-excited',     'btn-excited-pro', 'excited'],
  ];
  for (const [easy, pro, key] of pairs) {
    const active = _perfActive === key;
    [easy, pro].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.toggle('active', active);
    });
  }
}

// ── Easing helpers ──────────────────────────────────────────────────────────
const easeInOut = x => x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
const clamp     = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp      = (a, b, t)   => a + (b - a) * t;

// ── Performance: Jump ────────────────────────────────────────────────────────
// A single energetic arc: body bounces up, head tilts back, arms flare out,
// mouth opens wide with excitement, eyebrows shoot up.
function performJump() {
  startPerformance({
    name: '🦘 Jump!',
    key:  'jump',
    duration: 1.8,
    loop: false,
    update(t) {
      const p   = t / 1.8;                             // 0 → 1
      const arc = Math.sin(Math.PI * p);               // 0→1→0 arc
      const ea  = easeInOut(arc);
      // Squash at start/end, stretch at peak
      const squash = 1 - 0.4 * arc;   // body angle Y simulates up/down
      return {
        ParamBodyAngleY:  -8  * arc,
        ParamBodyAngleX:   0,
        ParamBodyAngleZ:   4  * Math.sin(Math.PI * 2 * p), // slight side twist
        ParamAngleX:      -12 * arc,   // head tilts back on the way up
        ParamAngleY:       0,
        ParamAngleZ:       6  * Math.sin(Math.PI * 2.5 * p),
        ParamArmL:         0.6 * arc,  // arms flare out
        ParamArmR:         0.6 * arc,
        ParamMouthOpenY:   0.9 * ea,
        ParamMouthForm:    0.4,
        ParamEyeLOpen:     clamp(1 - 0.5 * arc, 0, 1),
        ParamEyeROpen:     clamp(1 - 0.5 * arc, 0, 1),
        ParamEyeLSmile:    0.6 * ea,
        ParamEyeRSmile:    0.6 * ea,
        ParamBrowLY:       1.0 * ea,
        ParamBrowRY:       1.0 * ea,
        ParamBreath:       arc,
        ParamCheek:        0.7 * ea,
      };
    },
  });
}

// ── Performance: Wave Hello ──────────────────────────────────────────────────
// Arm rises up, then oscillates in a rapid enthusiastic wave for 2.5 s,
// then slowly lowers. Body leans, big smile throughout.
function performWaveBig() {
  const RAISE   = 0.35;  // seconds to raise arm
  const WAVE_END = 3.15; // seconds wave ends
  const LOWER   = 3.5;   // total duration

  startPerformance({
    name: '👋 Wave Hello!',
    key:  'wave',
    duration: LOWER,
    loop: false,
    update(t) {
      // Arm height envelope: 0→1 (raise), 1 (held), 1→0 (lower)
      const armH = t < RAISE
        ? easeInOut(t / RAISE)
        : t < WAVE_END
          ? 1
          : easeInOut(1 - (t - WAVE_END) / (LOWER - WAVE_END));

      // Waving oscillation only while raised (3.5 waves/s)
      const waving = t > RAISE && t < WAVE_END;
      const waveOsc = waving ? 0.4 * Math.sin(2 * Math.PI * 3.5 * (t - RAISE)) : 0;
      const armR = armH * (0.6 + waveOsc);

      return {
        ParamArmR:         clamp(armR, 0, 1),
        ParamArmL:        -0.15 * armH,          // other arm relaxes slightly
        ParamBodyAngleX:   6    * armH,           // lean toward raised arm
        ParamBodyAngleY:   0,
        ParamBodyAngleZ:  -4    * armH,
        ParamAngleX:       0,
        ParamAngleY:       5    * armH,           // face turns a little
        ParamAngleZ:       6    * armH,
        ParamEyeLSmile:    0.9  * armH,
        ParamEyeRSmile:    0.9  * armH,
        ParamEyeLOpen:     0.5  + 0.5 * (1 - armH),
        ParamEyeROpen:     0.5  + 0.5 * (1 - armH),
        ParamMouthOpenY:   0.5  * armH,
        ParamMouthForm:    1.0  * armH,
        ParamCheek:        0.9  * armH,
        ParamBrowLY:       0.6  * armH,
        ParamBrowRY:       0.6  * armH,
      };
    },
  });
}

// ── Performance: Dance (looping) ─────────────────────────────────────────────
// Full-body 2 s looping dance: body sways left-right with a bounce,
// arms alternate, head follows with a lag, mouth pulses to the beat.
function _buildDanceCfg() {
  return {
    name: '💃 Dancing!',
    key:  'dance',
    duration: 2.0,
    loop: true,
    update(t) {
      const phi  = (t / 2.0) * 2 * Math.PI;   // 1 cycle per 2 s
      const phi2 = phi * 2;                    // double-speed for beat accents

      const bodyX  =  9 * Math.sin(phi);
      const bodyBob = 3 * Math.abs(Math.sin(phi));   // bounces twice per cycle

      return {
        ParamBodyAngleX:   bodyX,
        ParamBodyAngleY:  -bodyBob,
        ParamBodyAngleZ:  -bodyX * 0.5,
        ParamArmL:         0.5 * Math.sin(phi + Math.PI),   // arms alternate
        ParamArmR:         0.5 * Math.sin(phi),
        ParamAngleX:       12 * Math.sin(phi - 0.3),         // head follows with lag
        ParamAngleZ:        8 * Math.sin(phi - 0.3),
        ParamAngleY:        0,
        ParamEyeLSmile:     0.8,
        ParamEyeRSmile:     0.8,
        ParamEyeLOpen:      0.55,
        ParamEyeROpen:      0.55,
        ParamMouthOpenY:    clamp(0.5 * Math.sin(phi2), 0, 1),  // mouth pulses on beat
        ParamMouthForm:     0.8,
        ParamCheek:         0.6,
        ParamBrowLY:        0.3 * Math.sin(phi + 0.4),
        ParamBrowRY:        0.3 * Math.sin(phi + 0.4),
        ParamBreath:        0.5 + 0.5 * Math.sin(phi),
      };
    },
  };
}

function toggleDance() {
  if (_perfActive === 'dance') { stopPerformance(); return; }
  startPerformance(_buildDanceCfg());
}

// ── Performance: Talk (looping) ──────────────────────────────────────────────
// Natural speech pattern: fast mouth open/close with pauses, head nods,
// occasional side tilts, eyebrows animate to convey emotion.
function _buildTalkCfg() {
  return {
    name: '💬 Talking…',
    key:  'talk',
    duration: 4.0,
    loop: true,
    update(t) {
      // Speech: fast phoneme bursts (4 Hz) gated by slow pause rhythm (0.5 Hz)
      const phoneme = Math.sin(2 * Math.PI * 4   * t);
      const pause   = 0.5 + 0.5 * Math.sin(2 * Math.PI * 0.5 * t);
      const mouth   = clamp(phoneme * pause, 0, 1) * 0.85;

      return {
        ParamMouthOpenY:   mouth,
        ParamMouthForm:    0.3 + 0.4 * Math.sin(2 * Math.PI * 0.7 * t),
        ParamAngleX:        4 * Math.sin(2 * Math.PI * 1.2 * t),   // head nod
        ParamAngleY:        6 * Math.sin(2 * Math.PI * 0.3 * t),   // side tilt
        ParamAngleZ:        3 * Math.sin(2 * Math.PI * 0.4 * t),
        ParamEyeLOpen:      0.85 + 0.15 * Math.sin(2 * Math.PI * 0.6 * t),
        ParamEyeROpen:      0.85 + 0.15 * Math.sin(2 * Math.PI * 0.6 * t),
        ParamBrowLY:        0.3 * Math.sin(2 * Math.PI * 0.5 * t),
        ParamBrowRY:        0.3 * Math.sin(2 * Math.PI * 0.5 * t),
        ParamBrowLAngle:    0.2 * Math.sin(2 * Math.PI * 0.8 * t),
        ParamBrowRAngle:   -0.2 * Math.sin(2 * Math.PI * 0.8 * t),
        ParamBodyAngleX:    2 * Math.sin(2 * Math.PI * 0.5 * t),
        ParamBodyAngleZ:    2 * Math.sin(2 * Math.PI * 0.5 * t),
        ParamBreath:        0.5 + 0.5 * Math.sin(2 * Math.PI * 0.25 * t),
      };
    },
  };
}

function toggleTalk() {
  if (_perfActive === 'talk') { stopPerformance(); return; }
  startPerformance(_buildTalkCfg());
}

// ── Performance: Excited (looping) ───────────────────────────────────────────
// Joyful, bouncy high-energy loop: rapid body shake, arms up, huge smile,
// mouth wide open. Think "I just won the lottery!".
function _buildExcitedCfg() {
  return {
    name: '🌟 Excited!',
    key:  'excited',
    duration: 1.2,
    loop: true,
    update(t) {
      const fast = 2 * Math.PI * (t / 1.2) * 3; // 3 oscillations per cycle
      const slow = 2 * Math.PI * (t / 1.2);

      return {
        ParamBodyAngleX:   8  * Math.sin(fast),
        ParamBodyAngleY:  -4  * Math.abs(Math.sin(fast)),
        ParamBodyAngleZ:  -5  * Math.sin(fast),
        ParamAngleX:       12 * Math.sin(fast - 0.25),
        ParamAngleZ:        8 * Math.sin(fast - 0.25),
        ParamAngleY:        0,
        ParamArmL:          0.55 * Math.sin(fast + Math.PI),
        ParamArmR:          0.55 * Math.sin(fast),
        ParamMouthOpenY:    0.6 + 0.4 * Math.abs(Math.sin(fast)),
        ParamMouthForm:     1.0,
        ParamEyeLSmile:     0.9,
        ParamEyeRSmile:     0.9,
        ParamEyeLOpen:      0.45 + 0.35 * Math.abs(Math.sin(slow)),
        ParamEyeROpen:      0.45 + 0.35 * Math.abs(Math.sin(slow)),
        ParamBrowLY:        0.8,
        ParamBrowRY:        0.8,
        ParamCheek:         1.0,
        ParamBreath:        Math.abs(Math.sin(fast)),
      };
    },
  };
}

function toggleExcited() {
  if (_perfActive === 'excited') { stopPerformance(); return; }
  startPerformance(_buildExcitedCfg());
}

// ── AI Control ───────────────────────────────────────────────────────────────

// Keyword → action mapping (longest/most-specific entries first)
const AI_KEYWORDS = [
  { words: ['jump', 'leap', 'bounce', 'hop'],         action: () => performJump() },
  { words: ['wave', 'hello', 'hi', 'greet', 'hey'],   action: () => performWaveBig() },
  { words: ['dance', 'dancing', 'groove', 'boogie', 'move'],  action: () => startPerformance(_buildDanceCfg()) },
  { words: ['talk', 'speak', 'chat', 'say', 'speech'],        action: () => startPerformance(_buildTalkCfg()) },
  { words: ['excited', 'exciting', 'yay', 'woah', 'wow', 'yeah', 'whoa', 'awesome'],
                                                               action: () => startPerformance(_buildExcitedCfg()) },
  { words: ['happy', 'joy', 'smile'],                  action: () => { applyExpression('happy'); } },
  { words: ['sad', 'cry', 'tear', 'unhappy'],          action: () => { applyExpression('sad'); } },
  { words: ['angry', 'mad', 'rage'],                   action: () => { applyExpression('angry'); } },
  { words: ['surpris', 'shock', 'omg'],                action: () => { applyExpression('surprised'); } },
  { words: ['wink', 'flirt'],                          action: () => { applyExpression('wink'); } },
  { words: ['idle', 'rest', 'relax', 'stop', 'calm'],  action: () => stopAll() },
  { words: ['tap'],                                    action: () => { stopPerformance(); playMotion('Tap', 0); } },
  { words: ['flick'],                                  action: () => { stopPerformance(); playMotion('Flick', 0); } },
];

const AI_REPLIES = {
  jump:     '🦘 Okay, I\'m jumping!',
  wave:     '👋 Hello there~!',
  dance:    '💃 Let\'s dance!',
  talk:     '💬 Sure, I\'ll keep talking!',
  excited:  '🌟 YAAAY!',
  happy:    '😊 Feeling happy!',
  sad:      '😢 Aww…',
  angry:    '😠 Grr!',
  surpris:  '😲 Whoa!!',
  wink:     '😉 Hehe~',
  idle:     '😌 Taking it easy.',
  tap:      '👆 *tap tap*',
  flick:    '💨 *whoosh*',
};

function sendAiText(mode) {
  const inputId = mode === 'pro' ? 'ai-text-pro' : 'ai-text';
  const replyEl = document.getElementById('ai-reply');
  const el      = document.getElementById(inputId);
  if (!el) return;
  const raw = el.value.trim().toLowerCase();
  el.value = '';
  if (!raw) return;

  let matched = false;
  for (const kv of AI_KEYWORDS) {
    if (kv.words.some(w => raw.includes(w))) {
      kv.action();
      // Find reply
      const key = kv.words[0];
      const reply = AI_REPLIES[key] || `✅ Doing: ${key}!`;
      if (replyEl) replyEl.textContent = reply;
      matched = true;
      break;
    }
  }
  if (!matched && replyEl) {
    replyEl.textContent = '🤔 I don\'t know that one. Try: jump, dance, wave, wave_big, talk, excited, tap, flick, happy, sad, angry, surprised, idle…';
  }
}

// Auto-cycle state
let _aiAutoTimer = null;
const AI_AUTO_ACTIONS = [
  () => performJump(),
  () => startPerformance(_buildDanceCfg()),
  () => performWaveBig(),
  () => startPerformance(_buildTalkCfg()),
  () => startPerformance(_buildExcitedCfg()),
  () => { stopPerformance(); playMotion('Tap', 0); },
  () => { stopPerformance(); playMotion('Flick', Math.random() < 0.5 ? 0 : 1); },
];

function toggleAiAuto(enabled) {
  // Keep both checkboxes in sync
  const easy = document.getElementById('chk-ai-auto');
  const pro  = document.getElementById('chk-ai-auto-pro');
  if (easy) easy.checked = enabled;
  if (pro)  pro.checked  = enabled;

  if (!enabled) {
    if (_aiAutoTimer) { clearTimeout(_aiAutoTimer); _aiAutoTimer = null; }
    return;
  }
  _scheduleNextAiAction();
}

function _scheduleNextAiAction() {
  // Pick a random action, run it, then schedule the next one after a random delay
  const fn = AI_AUTO_ACTIONS[Math.floor(Math.random() * AI_AUTO_ACTIONS.length)];
  fn();
  // Next action in 5 – 12 seconds
  const delay = 5000 + Math.random() * 7000;
  _aiAutoTimer = setTimeout(_scheduleNextAiAction, delay);
}

// ── Legacy wrapper kept for compatibility ────────────────────────────────────
function playWaveHello() { performWaveBig(); }

function toggleTracking(enabled) {
  if (!model) return;
  model.autoInteract = enabled;
  // Keep both checkboxes in sync
  document.getElementById('chk-track').checked = enabled;
  document.getElementById('chk-track-easy').checked = enabled;
}

function toggleManual(enabled) {
  manualMode = enabled;
  if (enabled) {
    stopAll();
    setStatus('🕹 Manual mode ON', 1500);

    model && model.motion('Idle');

function setBg(hex) {

  if (app && app.renderer.backgroundColor !== undefined) {
    app.renderer.backgroundColor = n;
  }
  document.getElementById('canvas-wrap').style.background = hex;

function setScale(v) {
  currentScale = parseFloat(v);
  const label = currentScale.toFixed(2);
  document.getElementById('val-scale-easy').textContent = label;
  document.getElementById('val-scale-pro').textContent = label;

}

// ── Expression presets (Easy mode) ──────────────────────────────────────────
function applyExpression(name) {
  const preset = EXPRESSIONS[name];
  if (!preset || !model) return;
  stopPerformance();
  manualMode = true;
  // Uncheck manual params toggle in pro panel if visible
  const chkManual = document.getElementById('chk-manual');
  if (chkManual) chkManual.checked = true;
  stopMotion();
  const core = model.internalModel.coreModel;
  for (const [paramId, value] of Object.entries(preset)) {
    try {
      core.setParameterValueById(paramId, value);
    } catch (e) {
      console.debug('Expression param error:', paramId, e);
    }
    overrides[paramId] = value;
    // Update sliders in pro panel if they exist
    const sl = document.getElementById('sl_' + paramId);
    const vl = document.getElementById('val_' + paramId);
    if (sl) sl.value = value;
    if (vl) vl.textContent = value.toFixed(2);
  }
  setStatus(`😊 Expression: ${name}`, 1500);
}

// ── Mode toggle ──────────────────────────────────────────────────────────────
function toggleMode() {
  proMode = !proMode;
  const btn = document.getElementById('mode-btn');
  if (proMode) {
    document.body.classList.add('pro-mode');
    btn.textContent = '✦ Easy Mode';
    setStatus('⚙ Pro Mode activated', 1500);
  } else {
    document.body.classList.remove('pro-mode');
    btn.textContent = '⚙ Pro Mode';
    // Exit manual mode when switching back to easy
    if (manualMode) toggleManual(false);
    setStatus('😊 Easy Mode activated', 1500);
  }
}

// ── Enhanced auto-animation (bigger blink + mouth motion) ───────────────────
// Runs AFTER the motion system updates parameters each frame by patching
// the internalModel's update method.
let _enhAnimTime = 0;
let _blinkTimer = 0;
let _nextBlink = 3.5;

function installEnhancedAnimation() {
  const im = model.internalModel;
  const origUpdate = im.update.bind(im);

  im.update = function(dt) {
    origUpdate(dt);
    if (manualMode) return;

    const dtSec = dt / 1000;
    _enhAnimTime += dtSec;
    _blinkTimer += dtSec;

    const core = im.coreModel;

    // ── Auto enhanced blink ──────────────────────────────────────────
    // Blend over whatever the motion system set for eye open.
    if (_blinkTimer >= _nextBlink) {
      const phase = _blinkTimer - _nextBlink;
      const half = 0.08; // 0.08 seconds (80 ms) to close, 80 ms to re-open
      if (phase < half * 2) {
        const openness = phase < half
          ? 1 - phase / half          // close: 1→0
          : (phase - half) / half;    // open:  0→1
        const clamped = Math.max(0, Math.min(1, openness));
        core.setParameterValueById('ParamEyeLOpen', clamped);
        core.setParameterValueById('ParamEyeROpen', clamped);
      } else {
        // Reset for next blink (random 3-6 s)
        _blinkTimer = 0;
        _nextBlink = 3 + Math.random() * 3;
      }
    }

    // ── Gentle mouth breathing (adds to any existing motion value) ───
    // Skips if a Wave motion appears to be running (best-effort check).
    const motionMgr = im.motionManager;
    let isWaving = false;
    try {
      isWaving = !!(motionMgr && motionMgr.currentGroup === 'Wave');
    } catch (_) { /* property may not exist in all SDK versions */ }
    if (!isWaving) {
      const breath = Math.sin(_enhAnimTime * Math.PI * 0.6) * 0.12;
      const existing = (() => {
        try {
          const idx = core.getParameterIndex('ParamMouthOpenY');
          return idx >= 0 ? core.getParameterValueByIndex(idx) : 0;
        } catch { return 0; }
      })();
      const combined = Math.max(0, Math.min(1, existing + Math.max(0, breath)));
      core.setParameterValueById('ParamMouthOpenY', combined);
    }
  };
}
