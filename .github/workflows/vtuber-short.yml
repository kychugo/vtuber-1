name: VTuber Auto-Short

# ──────────────────────────────────────────────────────────────────────────
# Triggers
# ──────────────────────────────────────────────────────────────────────────
on:
  # Run automatically every day at 12:00 UTC
  schedule:
    - cron: "0 12 * * *"

  # Trigger manually from the Actions tab with an optional topic hint
  workflow_dispatch:
    inputs:
      custom_topic:
        description: "Optional topic hint for the AI (leave blank for autonomous choice)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  generate-and-upload:
    name: Generate Short & Upload to YouTube
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Install FFmpeg and fonts for video composition and subtitle rendering
      - name: Install system dependencies
        run: |
          # Remove broken Microsoft apt repositories that ship on ubuntu-latest runners
          # and currently return 403 errors, causing apt-get update to fail.
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list \
                     /etc/apt/sources.list.d/microsoft-prod.list \
                     /etc/apt/sources.list.d/microsoft-prod.list.save
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-noto

      # Confirm FFmpeg is available
      - name: Verify FFmpeg
        run: ffmpeg -version | head -1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate short video and upload to YouTube
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          CUSTOM_TOPIC: ${{ inputs.custom_topic }}
        run: python scripts/generate_short.py

      # Commit the video backup and log even if the YouTube upload step failed
      - name: Commit video backup and log to repository
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add videos/ logs/ cache/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "chore: auto-backup video and update upload log [skip ci]"
            git push
          fi
