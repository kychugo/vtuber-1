<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miku Capture</title>

  <!-- Live2D Cubism 4 Core (served locally — downloaded by CI workflow) -->
  <script src="/scripts/vendor/live2dcubismcore.min.js"
          onerror="window.modelError='Failed to load Cubism Core SDK'"></script>
  <!-- PIXI.js v6 (served from node_modules installed by CI workflow) -->
  <script src="/node_modules/pixi.js/dist/browser/pixi.min.js"
          onerror="window.modelError='Failed to load PIXI.js'"></script>
  <!-- pixi-live2d-display cubism4 build (served from node_modules) -->
  <script src="/node_modules/pixi-live2d-display/dist/cubism4.min.js"
          onerror="window.modelError='Failed to load pixi-live2d-display'"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
    #canvas { display: block; width: 1080px; height: 1920px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
// Model path — served from the repo root by the local HTTP server
const MODEL_PATH = '/miku_sample_t04.model3.json';

// Signals for Puppeteer to poll
window.modelReady = false;
window.modelError = null;

// Exposed after init so Puppeteer can drive every frame deterministically.
// Call window.nextFrame(frameMs) before each screenshot; it advances the
// simulated clock by exactly frameMs milliseconds and forces a render.
window.nextFrame = null;

async function init() {
  try {
    const canvas = document.getElementById('canvas');

    const app = new PIXI.Application({
      view: canvas,
      width: 1080,
      height: 1920,
      transparent: true,
      antialias: true,
      resolution: 1,
      autoDensity: false,
    });

    // ── Gradient background drawn with Graphics ──────────────────────────────
    const gradient = app.renderer.generateTexture(
      (() => {
        const cvs = document.createElement('canvas');
        cvs.width = 1080;
        cvs.height = 1920;
        const ctx = cvs.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 1920);
        grad.addColorStop(0, '#1a0533');
        grad.addColorStop(0.5, '#2d1b69');
        grad.addColorStop(1, '#00c8a0');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1080, 1920);
        return new PIXI.Sprite(PIXI.Texture.from(cvs));
      })()
    );
    const bgSprite = new PIXI.Sprite(gradient);
    bgSprite.width = 1080;
    bgSprite.height = 1920;
    app.stage.addChild(bgSprite);

    // ── Load and position Live2D model ───────────────────────────────────────
    const model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
      autoInteract: false,  // no mouse interaction during capture
    });

    app.stage.addChild(model);

    const scale = Math.min(
      1080 / model.internalModel.originalWidth,
      1920 / model.internalModel.originalHeight
    ) * 0.92;
    model.scale.set(scale);
    model.x = 1080 / 2;
    model.y = 1920 / 2;
    model.anchor.set(0.5, 0.5);

    // Start idle animation loop
    model.motion('Idle');

    // ── Switch to deterministic manual-tick mode ─────────────────────────────
    // Stop the rAF-driven auto-tick so that ONLY our explicit nextFrame()
    // calls advance the animation.  This eliminates the variable-dt jitter
    // that causes the Live2D character to shake in the captured video.
    app.ticker.stop();
    // Also stop the shared ticker in case pixi-live2d-display registered there.
    if (PIXI.Ticker.shared !== app.ticker) {
      PIXI.Ticker.shared.stop();
    }

    // Warm up: advance 90 frames of animation so the idle motion and physics
    // spring settle before recording begins.  The settle clock uses 60 fps —
    // the standard Live2D physics tick rate — regardless of the capture FPS,
    // because this is purely about letting the spring simulation converge.
    const SETTLE_FPS = 60;
    const SETTLE_FRAME_MS = 1000 / SETTLE_FPS;
    let simTime = performance.now();
    for (let i = 0; i < 90; i++) {
      simTime += SETTLE_FRAME_MS;
      app.ticker.update(simTime);
      if (PIXI.Ticker.shared !== app.ticker) {
        PIXI.Ticker.shared.update(simTime);
      }
    }

    // Expose the frame-advance function for the Puppeteer capture loop.
    window._simTime = simTime;
    window.nextFrame = function(frameMs) {
      window._simTime += frameMs;
      app.ticker.update(window._simTime);
      if (PIXI.Ticker.shared !== app.ticker) {
        PIXI.Ticker.shared.update(window._simTime);
      }
      // Explicit render ensures the canvas reflects the new state before
      // Puppeteer screenshots it (belt-and-suspenders alongside ticker render).
      app.renderer.render(app.stage);
    };

    window.modelReady = true;
  } catch (err) {
    window.modelError = err.message || String(err);
    console.error('Live2D init error:', err);
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
