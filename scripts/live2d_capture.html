<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miku Capture</title>

  <!-- Live2D Cubism 4 Core (served locally — downloaded by CI workflow) -->
  <script src="/scripts/vendor/live2dcubismcore.min.js"
          onerror="window.modelError='Failed to load Cubism Core SDK'"></script>
  <!-- PIXI.js v6 (served from node_modules installed by CI workflow) -->
  <script src="/node_modules/pixi.js/dist/browser/pixi.min.js"
          onerror="window.modelError='Failed to load PIXI.js'"></script>
  <!-- pixi-live2d-display cubism4 build (served from node_modules) -->
  <script src="/node_modules/pixi-live2d-display/dist/cubism4.min.js"
          onerror="window.modelError='Failed to load pixi-live2d-display'"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; overflow: hidden; background: transparent; }
    #canvas { display: block; width: 1080px; height: 1920px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>

<script>
// Model path — served from the repo root by the local HTTP server
const MODEL_PATH = '/miku_sample_t04.model3.json';

// Signals for Puppeteer to poll
window.modelReady = false;
window.modelError = null;

async function init() {
  try {
    const canvas = document.getElementById('canvas');

    const app = new PIXI.Application({
      view: canvas,
      width: 1080,
      height: 1920,
      // Gradient background (anime teal-to-purple), rendered as a solid colour here;
      // real gradient is drawn via a Graphics object below.
      transparent: true,
      antialias: true,
      resolution: 1,
      autoDensity: false,
    });

    // ── Gradient background drawn with Graphics ──────────────────────────────
    const bg = new PIXI.Graphics();
    // Top colour  #1a0533 (dark purple)
    // Bottom colour #00c8a0 (teal)
    // Approximate with rectangles of varying alpha / layered fills
    const gradient = app.renderer.generateTexture(
      (() => {
        const g = new PIXI.Graphics();
        // Use a canvas-based texture for a real gradient
        const cvs = document.createElement('canvas');
        cvs.width = 1080;
        cvs.height = 1920;
        const ctx = cvs.getContext('2d');
        const grad = ctx.createLinearGradient(0, 0, 0, 1920);
        grad.addColorStop(0, '#1a0533');
        grad.addColorStop(0.5, '#2d1b69');
        grad.addColorStop(1, '#00c8a0');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, 1080, 1920);
        return new PIXI.Sprite(PIXI.Texture.from(cvs));
      })()
    );
    const bgSprite = new PIXI.Sprite(gradient);
    bgSprite.width = 1080;
    bgSprite.height = 1920;
    app.stage.addChild(bgSprite);

    // ── Load and position Live2D model ───────────────────────────────────────
    const model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
      autoInteract: false,  // no mouse interaction during capture
    });

    app.stage.addChild(model);

    // Fill 90 % of the frame height, centred horizontally, anchored at centre
    const scale = Math.min(
      1080 / model.internalModel.originalWidth,
      1920 / model.internalModel.originalHeight
    ) * 0.92;
    model.scale.set(scale);
    model.x = 1080 / 2;
    model.y = 1920 / 2;
    model.anchor.set(0.5, 0.5);

    // Start idle animation loop
    model.motion('Idle');

    // ── Fixed time-step animation control ───────────────────────────────────
    // The root cause of shaky-looking output is that Puppeteer screenshots
    // take variable amounts of time (50-100ms in headless Chromium), yet the
    // old code waited a *further* FRAME_MS after each screenshot.  This means
    // consecutive frames sampled from the Live2D animation were NOT equally
    // spaced in animation time, so motion appeared jerky when FFmpeg played
    // them back at a constant frame rate.
    //
    // Fix: stop PIXI's real-time RAF-driven tickers and advance the animation
    // by exactly one frame period via a controlled virtual clock before every
    // screenshot.  This guarantees uniform frame spacing regardless of how
    // long the screenshot round-trip takes.

    const sharedTicker = PIXI.Ticker.shared;

    // Halt the automatic render loops.
    sharedTicker.stop();
    app.ticker.stop();

    // Re-enable manual update() calls.  PIXI checks this flag before firing
    // listeners; we need it true even though the RAF loop is cancelled.
    // NOTE: _started is an internal property of PIXI.Ticker (pixi.js@6).
    // There is no public API to allow manual update() calls after stop(), so
    // this is a deliberate, version-pinned internal access.  If upgrading
    // pixi.js beyond v6, verify that Ticker.update() still respects _started.
    sharedTicker._started = true;
    app.ticker._started    = true;

    // Virtual clock — starts from now so the first delta is well-defined.
    let _vt = performance.now();

    // Physics warm-up: advance this many frames before recording so that
    // hair, clothes, and other physics constraints settle into natural positions.
    const WARM_UP_FRAMES = 90; // 1.5 s of animation time at 60 fps
    const WARM_FPS = 60;
    const WARM_FRAME_MS = 1000 / WARM_FPS;
    for (let i = 0; i < WARM_UP_FRAMES; i++) {
      _vt += WARM_FRAME_MS;
      sharedTicker.update(_vt);
    }
    // Render the settled state once.
    app.ticker.update(_vt);

    // Expose a frame stepper for Puppeteer to call before each screenshot.
    // Advancing both tickers with the same virtual time ensures the Live2D
    // model (driven by sharedTicker) and the PIXI renderer (driven by
    // app.ticker) always stay in sync.
    window.advanceFrame = function (ms) {
      _vt += ms;
      sharedTicker.update(_vt);
      app.ticker.update(_vt);
    };

    window.modelReady = true;
  } catch (err) {
    window.modelError = err.message || String(err);
    console.error('Live2D init error:', err);
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
